<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canyon Meadows - Menu</title>
    <style>
        /* Shared Styles */
        body {
            background-image: url('DinnerCM.png');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .saloon-sign {
            border: 8px double #5d4037;
            background-color: #efebe9;
            padding: 20px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        nav {
            margin-top: 15px;
            border-top: 2px solid #5d4037;
            padding-top: 10px;
        }

        .nav-link {
            text-decoration: none;
            color: #795548;
            font-weight: bold;
            margin: 0 15px;
            font-size: 1.2rem;
        }

        .nav-link:hover {
            color: #bf360c;
        }

        .content {
            max-width: 800px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 10px;
    </style>
</head>
<body>

    <div class="saloon-sign">
        <h1>Canyon Meadows</h1>
        <nav>
            <a href="index.html" class="nav-link" title="Home">🤠Home</a>
        </nav>
    </div>

    <div class="content">
        <h2>The Menu</h2>
        <p>Welcome to the menu page where all the western foods we have planned will be shown! Come and get some grub.</p>
    </div>

</body>
</html>

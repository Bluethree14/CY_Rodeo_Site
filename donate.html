<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canyon Meadows - Donations</title>
    <style>
        /* Shared Styles */
        body { 
        background-color: #d2b48c; 
        background-image: linear-gradient(to bottom, #8b4513, #d2b48c); 
        font-family: 'Courier New', Courier, monospace; 
        color: #3e2723; 
        margin: 0; 
        padding: 20px; 
        text-align: center; 
        }
        
        .saloon-sign { 
        border: 8px double #5d4037; 
        background-color: #efebe9; 
        padding: 20px; display: inline-block; 
        margin-bottom: 20px; 
        box-shadow: 5px 5px 15px rgba(0,0,0,0.3); 
        }
        
        h1 { 
        font-size: 3rem; margin: 0; 
        text-transform: uppercase; 
        letter-spacing: 5px; 
        }
        
        nav {
            margin-top: 15px;
            border-top: 2px solid #5d4037;
            padding-top: 10px;

            /* This aligns the boxes in a clean row that wraps on mobile */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        .nav-link {
            text-decoration: none;
            color: #3e2723; /* Darker brown for readability #795548; */
            font-weight: bold;
            /* margin: 0 15px; */
            font-size: 1.2rem;

            /* The "Box" Styling */
            background-color: #f5f5dc; /* Beige/Parchment color */
            border: 2px solid #5d4037;
            padding: 5px 5px;
            border-radius: 2px;
    
            /* Shadow for a 3D effect */
            box-shadow: 2px 2px 2px rgba(0,0,0,0.2);
    
            /* Smooth hover transition */
            transition: all 0.2s ease;
    
            /* Ensures buttons don't stretch weirdly */
            display: inline-block;
        }

        .nav-link:hover {
            /* color: #bf360c; */
            color: #ffffff;
            background-color: #795548; /* Darker wood color on hover */
            transform: translateY(-2px); /* Slight "lift" effect */
            box-shadow: 4px 4px 8px rgba(0,0,0,0.3);
        }
        
        .content { 
        max-width: 800px; 
        margin: 40px auto; 
        background: rgba(255, 255, 255, 0.2); 
        padding: 20px; 
        border-radius: 10px; 
        }
        
    </style>
</head>
<body>

    <div class="saloon-sign">
        <h1>Canyon Meadows</h1>
        <nav>
            <a href="index.html" class="nav-link" title="Home">🏠Home</a>
        </nav>
    </div>

    <div class="content">
        <h2>Contribute</h2>
        <p>Follow this link if you would like to support finacially.</p>
    </div>
  
    <div class="link-box">
    <a href="https://donate.jw.org/en/CAN/donation/RC">
        <img src="https://s.wordpress.com/mshots/v1/https://www.jw.org/en/CAN/donation/RC?w=300" alt="Site Preview">
        <p>Donate</p>
    </a>
    </div>

</body>
</html>
